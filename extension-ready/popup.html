<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DraftApply</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 360px;
      background: #f8fafc;
      color: #1e293b;
    }

    /* ── Header ── */
    .da-header {
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .da-header-logo {
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .da-header-logo img {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    .da-header-text { flex: 1; }

    .da-header-title {
      font-size: 15px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.2px;
      line-height: 1.2;
    }

    .da-header-sub {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.65);
      margin-top: 1px;
    }

    /* ── Status row ── */
    .da-status-row {
      display: flex;
      gap: 6px;
      padding: 10px 14px;
      background: white;
      border-bottom: 1px solid #f1f5f9;
    }

    .da-status-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      padding: 5px 10px;
      background: #f8fafc;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      min-width: 0;
    }

    .da-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #cbd5e1;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .da-status-dot.ready { background: #22c55e; }
    .da-status-dot.error { background: #ef4444; }

    .da-status-label {
      font-size: 11.5px;
      color: #475569;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Body ── */
    .da-body { padding: 14px; }

    .da-section-label {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    /* ── Upload area ── */
    .upload-area {
      border: 1.5px dashed #cbd5e1;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: white;
    }

    .upload-area:hover,
    .upload-area.dragover {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .upload-area.has-file {
      border-color: #22c55e;
      background: #f0fdf4;
    }

    .upload-icon-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      background: #f1f5f9;
      border-radius: 10px;
      margin: 0 auto 9px;
      transition: background 0.2s;
    }

    .upload-area:hover .upload-icon-wrap,
    .upload-area.dragover .upload-icon-wrap { background: #dbeafe; }
    .upload-area.has-file .upload-icon-wrap { background: #dcfce7; }

    .upload-text {
      font-size: 13px;
      color: #475569;
      line-height: 1.4;
    }

    .upload-link {
      color: #2563eb;
      font-weight: 600;
    }

    .upload-hint {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 3px;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      margin: 11px 0;
      color: #94a3b8;
      font-size: 11px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .divider span { padding: 0 10px; }

    /* ── Textarea ── */
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      min-height: 90px;
      color: #1e293b;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    textarea::placeholder { color: #94a3b8; }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.15s;
      letter-spacing: -0.1px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }

    .btn-secondary:hover { background: #e2e8f0; }

    /* ── CV Loaded card ── */
    .cv-loaded-card {
      background: white;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
    }

    .cv-loaded-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-bottom: 1px solid #f1f5f9;
    }

    .cv-check-icon {
      width: 26px;
      height: 26px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      color: #16a34a;
    }

    .cv-loaded-info { flex: 1; min-width: 0; }

    .cv-loaded-title {
      font-size: 13px;
      font-weight: 600;
      color: #166534;
    }

    .cv-change-btn {
      padding: 4px 11px;
      font-size: 12px;
      font-weight: 500;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      background: white;
      color: #64748b;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    .cv-change-btn:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
    }

    .cv-preview {
      padding: 9px 14px;
      font-size: 12px;
      color: #64748b;
      max-height: 52px;
      overflow: hidden;
      line-height: 1.5;
      background: #fafafa;
    }

    /* ── Page status ── */
    .page-status-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      background: white;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    /* ── Message ── */
    .message {
      padding: 9px 12px;
      background: #dcfce7;
      color: #166534;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 8px;
      border: 1px solid #bbf7d0;
      line-height: 1.4;
    }

    .message.error {
      background: #fee2e2;
      color: #dc2626;
      border-color: #fecaca;
    }

    /* ── Footer ── */
    .da-footer {
      padding: 8px 14px 14px;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      line-height: 1.5;
    }

    [hidden] { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="da-header">
    <div class="da-header-logo">
      <img src="icons/icon128.png" alt="" onerror="this.style.display='none'">
    </div>
    <div class="da-header-text">
      <div class="da-header-title">DraftApply</div>
      <div class="da-header-sub">AI job application assistant</div>
    </div>
  </div>

  <!-- Status row -->
  <div class="da-status-row">
    <div class="da-status-chip">
      <div class="da-status-dot" id="cv-status-dot"></div>
      <span class="da-status-label" id="cv-status-text">No CV</span>
    </div>
    <div class="da-status-chip">
      <div class="da-status-dot" id="proxy-status-dot"></div>
      <span class="da-status-label" id="proxy-status-text">Checking…</span>
    </div>
  </div>

  <div class="da-body">

    <!-- CV Input -->
    <div id="cv-input-section">
      <div class="da-section-label">Your CV</div>
      <div class="upload-area" id="upload-area">
        <input type="file" id="cv-file" accept=".pdf,.doc,.docx,.txt" hidden>
        <div class="upload-icon-wrap">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M10 13V3M10 3L7 6M10 3L13 6" stroke="#64748b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 14v2a2 2 0 002 2h10a2 2 0 002-2v-2" stroke="#64748b" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="upload-text">Drop file or <span class="upload-link">browse</span></div>
        <div class="upload-hint">PDF, DOCX, or TXT</div>
      </div>
      <div class="divider"><span>or paste text</span></div>
      <textarea id="cv-text" placeholder="Paste your CV text here…"></textarea>
      <button class="btn btn-primary" id="save-cv-btn">Save CV</button>
    </div>

    <!-- CV Loaded -->
    <div id="cv-loaded-section" hidden>
      <div class="da-section-label">Your CV</div>
      <div class="cv-loaded-card">
        <div class="cv-loaded-header">
          <div class="cv-check-icon">✓</div>
          <div class="cv-loaded-info">
            <div class="cv-loaded-title">CV loaded</div>
          </div>
          <button class="cv-change-btn" id="change-cv-btn">Change</button>
        </div>
        <div class="cv-preview" id="cv-preview"></div>
      </div>
    </div>

    <div class="message" id="message" hidden></div>

    <!-- Current Page -->
    <div id="activate-section" style="margin-top: 14px;">
      <div class="da-section-label">Current Page</div>
      <div class="page-status-card">
        <div class="da-status-dot" id="page-status-dot"></div>
        <span class="da-status-label" id="page-status-text">Checking…</span>
      </div>
      <button class="btn btn-primary" id="activate-btn" hidden>Activate on this page</button>
    </div>

  </div>

  <div class="da-footer">
    Click the <strong>DA</strong> button next to any field, or highlight a question and right-click.
  </div>

  <script src="popup.js"></script>
</body>
</html>
